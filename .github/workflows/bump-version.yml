name: Bump Version

on:
  push:
    branches:
      - main

concurrency:
  group: bump-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Skip existing version bump commits
        id: guard
        run: |
          subject=$(git log -1 --pretty=%s)
          if echo "$subject" | grep -Eiq 'bump version to [0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            non_version_changes=$(git diff --name-only HEAD^ HEAD -- . \
              ':(exclude)package.json' \
              ':(exclude)package-lock.json' \
              ':(exclude)cli/Cargo.toml' \
              ':(exclude)cli/Cargo.lock' \
              ':(exclude)src-tauri/Cargo.toml' \
              ':(exclude)src-tauri/Cargo.lock' \
              ':(exclude)src-tauri/tauri.conf.json')

            if [ -z "$non_version_changes" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bump release version files
        if: steps.guard.outputs.skip != 'true'
        run: node scripts/bump-release-version.mjs

      - name: Commit bumped version
        if: steps.guard.outputs.skip != 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")

          git add package.json package-lock.json cli/Cargo.toml cli/Cargo.lock src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore(release): bump version to ${version}"
          git push origin HEAD:main
