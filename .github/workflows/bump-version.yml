name: Bump Version

on:
  push:
    branches:
      - main

concurrency:
  group: bump-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Skip existing version bump commits
        id: guard
        run: |
          subject=$(git log -1 --pretty=%s)
          if echo "$subject" | grep -Eiq '^chore(\(release\))?: bump version to [0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bump release version files
        if: steps.guard.outputs.skip != 'true'
        run: node scripts/bump-release-version.js

      - name: Commit bumped version
        if: steps.guard.outputs.skip != 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")

          git add -A
          git commit -m "chore(release): bump version to ${version}"
          git push origin HEAD:main
